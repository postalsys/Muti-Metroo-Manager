name: Release Please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            upx: false
          - goos: darwin
            goarch: amd64
            upx: false
          - goos: linux
            goarch: amd64
            upx: true
          - goos: linux
            goarch: arm64
            upx: true
          - goos: windows
            goarch: amd64
            upx: true
          - goos: windows
            goarch: arm64
            upx: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${{ needs.release-please.outputs.tag_name }}
          VERSION=${VERSION#v}
          VERSION=${VERSION#metroo-manager-v}
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          BINARY_NAME="metroo-manager-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"

          go build -trimpath \
            -ldflags="-s -w -X main.Version=$VERSION" \
            -o "$BINARY_NAME" \
            ./cmd/manager

      - name: Install UPX
        if: matrix.upx
        run: |
          sudo apt-get update
          sudo apt-get install -y upx

      - name: Compress with UPX
        if: matrix.upx
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          BINARY_NAME="metroo-manager-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          upx --best --lzma "$BINARY_NAME" || echo "UPX compression failed, using uncompressed binary"

      - name: Upload binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          BINARY_NAME="metroo-manager-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          gh release upload "${{ needs.release-please.outputs.tag_name }}" "$BINARY_NAME" --clobber

  checksums:
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ needs.release-please.outputs.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "metroo-manager-*"

      - name: Create checksums
        run: |
          sha256sum metroo-manager-* > checksums.txt
          cat checksums.txt

      - name: Upload checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" checksums.txt \
            --repo "${{ github.repository }}" --clobber
